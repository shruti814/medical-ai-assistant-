<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Medical Assistant</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    p {
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    .record-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: #00c6ff;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .record-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 114, 255, 0.4);
    }

    .record-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .output {
      margin-top: 25px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 15px;
      font-size: 0.9rem;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      margin-top: 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Medical Assistant</h1>
    <p>Speak your symptoms. No login. No data stored.</p>

    <button class="record-btn" id="recordBtn">🎙️ Start Recording</button>

    <div class="output" id="output" style="display: none;">
      <span class="label">Transcription:</span>
      <div id="transcription">—</div>

      <span class="label">AI Assessment:</span>
      <div id="assessment">—</div>
    </div>

    <footer>
      WARNING: AI-generated guidance.
    </footer>
  </div>
<script>
  let mediaRecorder;
  let audioChunks = [];

  const recordBtn = document.getElementById("recordBtn");
  const output = document.getElementById("output");
  const transcriptionDiv = document.getElementById("transcription");
  const assessmentDiv = document.getElementById("assessment");

  output.style.display = "none";

  recordBtn.onclick = async () => {
    if (recordBtn.innerText.includes("Start")) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

        recordBtn.innerText = "⏹️ Stop Recording";
      } catch (err) {
        alert("Microphone access denied. Please allow mic permission.");
        console.error(err);
      }
    }

    else {
      mediaRecorder.stop();
      recordBtn.innerText = "🎙️ Start Recording";

      mediaRecorder.onstop = async () => {
        output.style.display = "block";
        transcriptionDiv.innerText = "Transcribing audio…";
        assessmentDiv.innerHTML = "Analyzing symptoms…";

        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", audioBlob, "audio.webm");

        try {
          const res = await fetch("/process_audio", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          transcriptionDiv.innerText =
            data.transcription || "No speech detected";

          assessmentDiv.innerHTML = `
            <p><strong>Severity:</strong> ${data.severity}</p>
            <p><strong>Symptoms:</strong> ${
              data.symptoms.length ? data.symptoms.join(", ") : "None detected"
            }</p>
            <p><strong>Medicines:</strong> ${
              data.medicines.length ? data.medicines.join(", ") : "None mentioned"
            }</p>
            <p><strong>Possible Conditions:</strong> ${
              data.possible_conditions.length
                ? data.possible_conditions.join(", ")
                : "Not identified"
            }</p>
            <p><strong>Alerts:</strong> ${
              data.alerts.length ? data.alerts.join(", ") : "None"
            }</p>
          `;
        } catch (err) {
          transcriptionDiv.innerText = "Error processing audio";
          assessmentDiv.innerText = "Backend connection failed";
          console.error(err);
        }
      };
    }
  };
</script>

</body>
</html>
